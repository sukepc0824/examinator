<body>
    <script>
        function collatz(n) {
            if (n <= 0) {
                console.log("正の整数を入力してください");
                return;
            }

            console.log("初期値: " + n);

            let steps = 0;

            while (n !== 1) {
                if (n % 2 === 0) {
                    n = n / 2;
                } else {
                    n = 3 * n + 1;
                }
                console.log(n);
                steps++;
            }

            console.log("1に到達しました。ステップ数: " + steps);
        }
        collatz(12414255);

    </script>
</body>
